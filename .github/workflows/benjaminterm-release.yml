name: benjaminterm-release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish
        required: true
        default: v1.4.5
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

env:
  BENJAMINTERM_NODE_VERSION: "25.9.0"
  RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Install Node latest
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.BENJAMINTERM_NODE_VERSION }}
      - name: Verify Node latest
        shell: bash
        run: |
          node --version
          npm --version
      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          notes_file="$(mktemp)"
          cat > "$notes_file" <<'NOTES'
          benjaminterm release.

          Windows is the primary supported platform. macOS and Linux artifacts are portable builds.

          This release includes built-in clickable local path handling for terminal output.
          NOTES

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
          fi

          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes-file "$notes_file" \
            --draft

  windows:
    runs-on: windows-2022
    needs: prepare-release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install Node latest
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.BENJAMINTERM_NODE_VERSION }}
      - name: Verify Node latest
        shell: pwsh
        run: |
          node --version
          npm --version
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        shell: cmd
        run: |
          PATH C:\Strawberry\perl\bin;%PATH%
          cargo build -p wezterm -p wezterm-gui -p wezterm-mux-server -p strip-ansi-escapes --release
      - name: Package portable zip
        shell: pwsh
        run: ./ci/package-benjaminterm-windows.ps1 -TagName "$env:RELEASE_TAG"
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y
      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc -DMyAppVersion="$env:RELEASE_TAG" -F"benjaminterm-$env:RELEASE_TAG-setup" ci/windows-installer.iss
      - name: Upload Windows release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = @()
          $files += Get-ChildItem -Path dist -Filter "benjaminterm-windows-*.zip" -File
          $files += Get-ChildItem -Path . -Filter "benjaminterm-*.exe" -File
          if ($files.Count -eq 0) {
            throw "No Windows release assets were produced."
          }

          $releaseFiles = @()
          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash.ToLowerInvariant()
            $checksumPath = "$($file.FullName).sha256"
            "$hash  $($file.Name)" | Set-Content -LiteralPath $checksumPath -NoNewline
            $releaseFiles += $file.FullName
            $releaseFiles += $checksumPath
          }

          & gh release upload "$env:RELEASE_TAG" @releaseFiles --repo "${{ github.repository }}" --clobber

  macos:
    runs-on: macos-latest
    needs: prepare-release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install Node latest
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.BENJAMINTERM_NODE_VERSION }}
      - name: Verify Node latest
        shell: bash
        run: |
          node --version
          npm --version
      - name: Install Rust targets
        shell: bash
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin
      - name: Install dependencies
        shell: bash
        run: env CI=yes PATH=$PATH ./get-deps
      - name: Build universal components
        shell: bash
        run: |
          for bin in wezterm wezterm-gui wezterm-mux-server strip-ansi-escapes; do
            cargo build --target x86_64-apple-darwin -p "$bin" --release
            cargo build --target aarch64-apple-darwin -p "$bin" --release
          done
      - name: Package app zip
        shell: bash
        run: TAG_NAME="$RELEASE_TAG" bash ci/package-benjaminterm-macos.sh
      - name: Upload macOS release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(benjaminterm-macos-*.zip)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No macOS release assets were produced." >&2
            exit 1
          fi

          checksum_files=()
          for f in "${files[@]}"; do
            sha256sum "$f" > "$f.sha256"
            checksum_files+=("$f.sha256")
          done

          gh release upload "$RELEASE_TAG" "${files[@]}" "${checksum_files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  linux:
    runs-on: ubuntu-24.04
    needs: prepare-release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Install Node latest
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.BENJAMINTERM_NODE_VERSION }}
      - name: Verify Node latest
        shell: bash
        run: |
          node --version
          npm --version
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        shell: bash
        run: env CI=yes PATH=$PATH ./get-deps
      - name: Build
        shell: bash
        run: cargo build -p wezterm -p wezterm-gui -p wezterm-mux-server -p strip-ansi-escapes --release
      - name: Package portable tarball
        shell: bash
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          pkg="benjaminterm-linux-$tag"
          rm -rf "$pkg" "$pkg.tar.gz"
          mkdir -p "$pkg/fonts" "$pkg/sounds"
          cp target/release/wezterm "$pkg/benjaminterm"
          cp target/release/wezterm-gui "$pkg/benjaminterm-gui"
          cp target/release/wezterm-mux-server "$pkg/benjaminterm-mux-server"
          cp target/release/strip-ansi-escapes "$pkg/strip-ansi-escapes"
          cp extras/benjaminterm/benjaminterm.lua "$pkg/wezterm.lua"
          cp -r assets/fonts/* "$pkg/fonts/"
          cp -r assets/sounds/benjaminterm-soft-cues "$pkg/sounds/"
          tar czf "$pkg.tar.gz" "$pkg"
      - name: Upload Linux release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(benjaminterm-linux-*.tar.gz)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Linux release assets were produced." >&2
            exit 1
          fi

          checksum_files=()
          for f in "${files[@]}"; do
            sha256sum "$f" > "$f.sha256"
            checksum_files+=("$f.sha256")
          done

          gh release upload "$RELEASE_TAG" "${files[@]}" "${checksum_files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
      - linux
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Install Node latest
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.BENJAMINTERM_NODE_VERSION }}
      - name: Verify Node latest
        shell: bash
        run: |
          node --version
          npm --version
      - name: Publish draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --latest
